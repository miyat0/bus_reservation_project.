{% extends 'base.html' %}

{% block content %}
<div style="display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 200px); padding: 40px 20px;">
    <div class="card" style="max-width: 480px; width: 100%; padding: 56px; position: relative; border-radius: var(--radius-lg); box-shadow: 0 40px 80px rgba(0,0,0,0.08);">
        
        <!-- Brand Identity -->
        <div style="text-align: center; margin-bottom: 40px;">
            <div style="width: 72px; height: 72px; background: var(--primary); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; box-shadow: 0 10px 20px rgba(239, 68, 68, 0.2);">
                <i class="fas fa-bolt" style="color: #fff; font-size: 2rem;"></i>
            </div>
            <h1 style="font-size: 2.25rem; font-weight: 900; letter-spacing: -0.04em; margin-bottom: 8px; color: var(--text);">Welcome Back</h1>
            <p class="muted-text">Sign in to your Quickgo account to manage your bookings and explore new journeys.</p>
        </div>

        {% if form.errors %}
            <div style="background: #fee2e2; color: #991b1b; padding: 16px; border-radius: var(--radius-md); font-size: 0.9rem; font-weight: 700; margin-bottom: 32px; text-align: center; border: 1px solid rgba(239, 68, 68, 0.15); display: flex; align-items: center; gap: 12px; justify-content: center;">
                <i class="fas fa-circle-exclamation"></i>
                <span>Invalid credentials. Please try again.</span>
            </div>
        {% endif %}

        <form method="post" autocomplete="off">
            {% csrf_token %}
            
            <div class="form-group">
                <label class="label">Username</label>
                <div style="position: relative;">
                    <i class="fas fa-user" style="position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 1rem;"></i>
                    <input type="text" name="username" required placeholder="Enter your username" class="input" style="padding-left: 48px; height: 56px;">
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 32px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                    <label class="label" style="margin-bottom: 0;">Password</label>
                    <a href="#" style="font-size: 0.8rem; font-weight: 800; color: var(--primary); text-decoration: none;">Forgot?</a>
                </div>
                <div style="position: relative;">
                    <i class="fas fa-lock" style="position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 1rem;"></i>
                    <input type="password" name="password" required placeholder="••••••••••••" class="input" style="padding-left: 48px; height: 56px;">
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; height: 56px; font-size: 1.1rem;">
                Sign In to Quickgo
            </button>
            
            <div style="text-align: center; margin-top: 32px; font-size: 0.95rem; font-weight: 600;">
                <span style="color: var(--text-muted);">Don't have an account?</span>
                <a href="{% url 'signup' %}" style="color: var(--primary); margin-left: 6px; font-weight: 800; text-decoration: none;">Create one now</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
