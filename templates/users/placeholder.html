{% extends 'base.html' %}

{% block content %}
<div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 400px; text-align: center;">
    <div style="width: 100px; height: 100px; background: var(--primary-soft); color: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; margin-bottom: 24px;">
        <i class="fas fa-user-gear"></i>
    </div>
    <h1 style="font-size: 2.5rem; font-weight: 800; margin-bottom: 12px;">{{ title }}</h1>
    <p style="color: var(--text-muted); font-size: 1.1rem; max-width: 500px;">
        This section is coming soon. You'll be able to manage your profile and travel preferences here.
    </p>
    <a href="{% url 'user_dashboard' %}" class="primary-button" style="margin-top: 32px;">Back to Home</a>
</div>
{% endblock %}
