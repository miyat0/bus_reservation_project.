{% extends 'base.html' %}

{% block content %}
<div style="display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 240px);">
    <div class="glass-card" style="max-width: 500px; width: 100%; padding: 48px; position: relative;">
        <!-- Security Accent -->
        <div style="position: absolute; top: -30px; left: 50%; transform: translateX(-50%); width: 60px; height: 60px; background: var(--sidebar-bg); border-radius: 18px; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-lg);">
            <i class="fas fa-key" style="color: #fff; font-size: 1.5rem;"></i>
        </div>

        <div style="text-align: center; margin-top: 20px; margin-bottom: 32px;">
            <h1 style="font-size: 2rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 8px;">Update Password</h1>
            <p style="color: var(--text-muted); font-weight: 600;">Keep your account secure.</p>
        </div>

        <form method="post" style="display: flex; flex-direction: column; gap: 20px;">
            {% csrf_token %}
            
            {% for field in form %}
                <div style="display: flex; flex-direction: column; gap: 8px;">
                    <label style="font-size: 0.85rem; font-weight: 700; color: var(--text-main); margin-left: 4px;">{{ field.label }}</label>
                    <div style="position: relative;">
                        <input type="password" name="{{ field.name }}" required class="form-input" style="width: 100%; padding: 14px 14px; border-radius: 12px; border: 1px solid var(--line); background: #fff; font-weight: 600; outline: none; transition: 0.2s;" onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='var(--line)'">
                    </div>
                    {% if field.errors %}
                        <div style="color: #ef4444; font-size: 0.75rem; font-weight: 600;">{{ field.errors.0 }}</div>
                    {% endif %}
                </div>
            {% endfor %}

            <button type="submit" class="primary-button" style="width: 100%; padding: 16px; font-size: 1rem; margin-top: 12px;">Change Password</button>
            
            <div style="text-align: center; margin-top: 16px; font-size: 0.9rem; font-weight: 600;">
                <a href="javascript:history.back()" style="color: var(--text-muted);">Cancel and go back</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
