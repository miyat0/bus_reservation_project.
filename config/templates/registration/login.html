{% extends 'base.html' %}

{% block content %}
<div style="display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 200px);">
    <div class="glass-card" style="max-width: 450px; width: 100%; padding: 48px; position: relative;">
        <!-- Brand Accent -->
        <div style="position: absolute; top: -30px; left: 50%; transform: translateX(-50%); width: 60px; height: 60px; background: var(--primary); border-radius: 18px; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-lg);">
            <i class="fas fa-key" style="color: #000; font-size: 1.5rem;"></i>
        </div>

        <div style="text-align: center; margin-top: 20px; margin-bottom: 32px;">
            <h1 style="font-size: 2rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 8px;">Welcome Back</h1>
            <p style="color: var(--text-muted); font-weight: 600;">Sign in to manage your journey.</p>
        </div>

        {% if form.errors %}
            <div style="background: #fee2e2; color: #991b1b; padding: 12px 16px; border-radius: 12px; font-size: 0.85rem; font-weight: 600; margin-bottom: 24px; text-align: center; border: 1px solid rgba(239, 68, 68, 0.2);">
                Invalid credentials. Please try again.
            </div>
        {% endif %}

        <form method="post" style="display: flex; flex-direction: column; gap: 20px;">
            {% csrf_token %}
            
            <div style="display: flex; flex-direction: column; gap: 8px;">
                <label style="font-size: 0.85rem; font-weight: 700; color: var(--text-main); margin-left: 4px;">Username</label>
                <div style="position: relative;">
                    <i class="fas fa-user" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 0.9rem;"></i>
                    <input type="text" name="username" required placeholder="Enter username" style="width: 100%; padding: 14px 14px 14px 44px; border-radius: 12px; border: 1px solid var(--line); background: #fff; font-weight: 600; outline: none; transition: border-color 0.2s;" onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--line)'">
                </div>
            </div>

            <div style="display: flex; flex-direction: column; gap: 8px;">
                <label style="font-size: 0.85rem; font-weight: 700; color: var(--text-main); margin-left: 4px;">Password</label>
                <div style="position: relative;">
                    <i class="fas fa-lock" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 0.9rem;"></i>
                    <input type="password" name="password" required placeholder="••••••••" style="width: 100%; padding: 14px 14px 14px 44px; border-radius: 12px; border: 1px solid var(--line); background: #fff; font-weight: 600; outline: none; transition: border-color 0.2s;" onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--line)'">
                </div>
            </div>

            <button type="submit" class="primary-button" style="width: 100%; padding: 16px; font-size: 1rem; margin-top: 12px;">Sign In Now</button>
            
            <div style="text-align: center; margin-top: 16px; font-size: 0.9rem; font-weight: 600;">
                <span style="color: var(--text-muted);">New here?</span>
                <a href="{% url 'signup' %}" style="color: var(--accent); margin-left: 4px;">Create an account</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
