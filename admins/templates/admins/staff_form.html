{% extends 'base.html' %}

{% block header_extra %}
    <div style="font-size: 0.85rem; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px;">Human Resources</div>
    <h1 class="page-title" style="margin: 0;">Add New Staff Member</h1>
{% endblock %}

{% block content %}
<div class="card-header" style="margin-bottom: 32px;">
    <p class="muted-text">Create a new operational account and assign initial service duties for the network.</p>
</div>

<div class="card" style="max-width: 800px; margin: 0 auto; padding: 48px;">
    <form method="post" autocomplete="off">
        {% csrf_token %}
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin-bottom: 32px;">
            <div class="form-group">
                <label class="label">Username</label>
                <div style="position: relative;">
                    <i class="fas fa-user-circle" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                    <input type="text" name="username" required placeholder="Staff ID or Name" class="input" style="padding-left: 44px;">
                </div>
            </div>
            <div class="form-group">
                <label class="label">Email Address</label>
                <div style="position: relative;">
                    <i class="fas fa-envelope" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                    <input type="email" name="email" required placeholder="staff@quickgo.com" class="input" style="padding-left: 44px;">
                </div>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin-bottom: 32px;">
            <div class="form-group">
                <label class="label">Access Password</label>
                <div style="position: relative;">
                    <i class="fas fa-key" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                    <input type="password" name="password" required placeholder="••••••••" class="input" style="padding-left: 44px;">
                </div>
            </div>
            <div class="form-group">
                <label class="label">Contact Number</label>
                <div style="position: relative;">
                    <i class="fas fa-phone" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                    <input type="text" name="contact_number" maxlength="10" placeholder="10-digit phone number" class="input" style="padding-left: 44px;">
                </div>
            </div>
        </div>

        <div class="form-group" style="margin-bottom: 40px;">
            <label class="label">Initial Service Assignment (Optional)</label>
            <div style="position: relative;">
                <i class="fas fa-bus-simple" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                <select name="bus_id" class="input" style="padding-left: 44px;">
                    <option value="">-- No Assignment --</option>
                    {% for bus in buses %}
                        {% with bus.staff_set.first as assigned_staff %}
                            {% if assigned_staff %}
                                <option value="{{ bus.id }}" disabled style="color: #94a3b8; font-style: italic;">
                                    {{ bus.bus_name }} ({{ bus.source }} → {{ bus.destination }}) - Assigned to {{ assigned_staff.user.username }}
                                </option>
                            {% else %}
                                <option value="{{ bus.id }}">{{ bus.bus_name }} ({{ bus.source }} → {{ bus.destination }})</option>
                            {% endif %}
                        {% endwith %}
                    {% endfor %}
                </select>
            </div>
        </div>

        <div style="display: flex; gap: 16px; padding-top: 24px; border-top: 1px solid var(--line);">
            <button type="submit" class="btn btn-primary" style="flex: 1; justify-content: center; height: 56px;">
                <i class="fas fa-user-plus"></i> Create Staff Account
            </button>
            <a href="{% url 'all_users' %}" class="btn btn-outline" style="flex: 1; justify-content: center; height: 56px;">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
