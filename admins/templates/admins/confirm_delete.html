{% extends 'base.html' %}

{% block content %}
<div style="display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 200px); padding: 40px 20px;">
    <div class="card" style="max-width: 560px; width: 100%; padding: 56px; border-radius: var(--radius-lg); text-align: center; border-top: 6px solid var(--danger);">
        
        <div style="width: 80px; height: 80px; background: #fee2e2; color: var(--danger); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.25rem; margin: 0 auto 32px; box-shadow: 0 10px 20px rgba(239, 68, 68, 0.1);">
            <i class="fas fa-trash-can"></i>
        </div>
        
        <h1 style="font-size: 2rem; font-weight: 900; margin-bottom: 16px; color: var(--text);">Confirm Deletion</h1>
        <p class="muted-text" style="margin-bottom: 40px; line-height: 1.6;">
            Are you sure you want to permanently delete this <strong>{{ type }}</strong>?<br>
            All associated data will be removed and this action <strong>cannot be undone</strong>.
        </p>

        <div style="background: var(--bg); border: 1px solid var(--line); border-radius: var(--radius-md); padding: 24px; margin-bottom: 40px; text-align: left;">
            <div style="font-size: 0.75rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px;">Target Object</div>
            <div style="font-size: 1.15rem; font-weight: 800; color: var(--text);">{{ object }}</div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 16px;">
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; height: 56px; font-size: 1.1rem; background: var(--danger);">
                    <i class="fas fa-check"></i> Yes, Confirm Delete
                </button>
            </form>
            <a href="{{ request.META.HTTP_REFERER|default:'/' }}" class="btn btn-outline" style="width: 100%; justify-content: center; height: 56px; font-size: 1.1rem;">
                Cancel and Go Back
            </a>
        </div>
    </div>
</div>
{% endblock %}
