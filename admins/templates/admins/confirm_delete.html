{% extends 'base.html' %}

{% block content %}
<div style="max-width: 600px; margin: 80px auto; text-align: center;">
    <div class="glass-card" style="padding: 60px 40px;">
        <div style="width: 80px; height: 80px; background: #fee2e2; color: #ef4444; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; margin: 0 auto 32px;">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        
        <h1 style="font-size: 2rem; font-weight: 800; margin-bottom: 16px; color: var(--text-main);">Confirm Deletion</h1>
        <p style="color: var(--text-muted); font-weight: 600; line-height: 1.6; margin-bottom: 40px;">
            Are you sure you want to delete this <strong>{{ type }}</strong>?<br>
            This action cannot be undone.
        </p>

        <div style="background: #f8fafc; border: 1px solid var(--line); border-radius: 16px; padding: 24px; margin-bottom: 40px; text-align: left;">
            <div style="font-size: 0.7rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px;">Selected Item</div>
            <div style="font-size: 1.1rem; font-weight: 800; color: var(--accent);">{{ object }}</div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 12px;">
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="primary-button" style="width: 100%; background: #ef4444; box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2); padding: 16px; font-size: 1rem;">Yes, Confirm Delete</button>
            </form>
            <a href="{% if type == 'Booking' %}{% url 'all_bookings' %}{% else %}{% url 'bus_list' %}{% endif %}" class="secondary-button" style="width: 100%; padding: 16px; font-size: 1rem; display: block; text-decoration: none;">Cancel and Go Back</a>
        </div>
    </div>
</div>
{% endblock %}
